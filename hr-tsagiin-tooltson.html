<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --ink:#1E2421;
    --paper:#F7F3EA;
    --paper-dim:#ECE5D4;
    --steel:#41505B;
    --steel-dark:#2A343C;
    --ore:#C45A28;
    --dusk:#2B4257;
    --safety:#E2A93B;
    --line:rgba(30,36,33,0.14);
    --ok:#3F6B4E;
  }
  *{box-sizing:border-box;}
  .uts-app{font-family:'Inter',sans-serif; color:var(--ink); background:var(--paper); min-height:100%; padding:0 0 40px; line-height:1.45;}
  .uts-app input, .uts-app select, .uts-app button{font-family:inherit;}
  .uts-mono{font-family:'IBM Plex Mono',monospace;}

  .uts-header{background:var(--steel-dark); color:var(--paper); padding:18px 22px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .uts-mark{width:32px; height:32px; border-radius:4px; overflow:hidden; flex-shrink:0; border:1px solid rgba(247,243,234,.25);}
  .uts-mark div{height:33.3%;}
  .uts-brand-text .t1{font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;}
  .uts-brand-text .t2{font-size:11px; opacity:.65; font-family:'IBM Plex Mono',monospace;}

  .uts-body{max-width:980px; margin:0 auto; padding:24px 20px 0;}

  .uts-tabs{display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; border-bottom:1px solid var(--line);}
  .uts-tab{background:transparent; border:none; padding:10px 16px; cursor:pointer; font-size:13.5px; font-weight:600; color:var(--steel); border-bottom:2.5px solid transparent; font-family:'Oswald',sans-serif; letter-spacing:.03em; text-transform:uppercase;}
  .uts-tab.active{color:var(--ink); border-bottom-color:var(--ore);}

  .uts-card{background:#fff; border:1px solid var(--line); border-radius:6px; padding:20px; margin-bottom:18px;}
  .uts-card h3{margin:0 0 14px; font-size:15px; font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.03em;}
  .uts-row{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;}
  .uts-field{display:flex; flex-direction:column; gap:5px;}
  .uts-field label{font-size:11.5px; color:var(--steel); text-transform:uppercase; letter-spacing:.04em; font-weight:600;}
  .uts-field input, .uts-field select{border:1px solid var(--line); border-radius:4px; padding:9px 10px; font-size:14px; background:var(--paper); min-width:140px;}
  .uts-btn{background:var(--ore); color:#fff; border:none; padding:10px 18px; border-radius:4px; cursor:pointer; font-weight:600; font-size:13.5px; font-family:'Oswald',sans-serif; letter-spacing:.03em; text-transform:uppercase;}
  .uts-btn:hover{opacity:.88;}
  .uts-btn.secondary{background:var(--steel);}
  .uts-btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}

  table.uts-table{width:100%; border-collapse:collapse; font-size:13px;}
  table.uts-table th, table.uts-table td{padding:8px 9px; border-bottom:1px solid var(--line); text-align:left;}
  table.uts-table th{font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--steel); background:var(--paper-dim);}
  .uts-table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:6px;}

  .uts-badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; font-family:'IBM Plex Mono',monospace;}
  .uts-badge.ok{background:#e2efe5; color:var(--ok);}
  .uts-badge.pending{background:#fbeede; color:var(--ore);}
  .uts-badge.empty{background:#eee; color:#888;}

  .uts-summary-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin:14px 0;}
  .uts-stat{background:var(--paper-dim); border-radius:5px; padding:12px; text-align:center;}
  .uts-stat .v{font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600;}
  .uts-stat .l{font-size:10.5px; color:var(--steel); text-transform:uppercase; letter-spacing:.03em; margin-top:3px;}

  .uts-empty{text-align:center; padding:34px 20px; color:var(--steel);}
  .uts-note{font-size:12.5px; color:var(--steel); background:var(--paper-dim); border-radius:5px; padding:10px 12px; margin-top:14px;}
  .uts-footer-note{max-width:980px; margin:26px auto 0; padding:0 20px; font-size:11.5px; color:var(--steel); text-align:center;}

  @media (max-width:640px){
    .uts-row{flex-direction:column; align-items:stretch;}
    .uts-field input,.uts-field select{min-width:0; width:100%;}
  }
</style>

<div class="uts-app" id="uts-root"></div>

<script>
(function(){
  const root = document.getElementById('uts-root');

  let STATE = {
    tab: 'employees',
    employees: [],
    editingId: null,
    entryEmpId: '',
    entryMonth: currentMonthStr(),
    dashMonth: currentMonthStr(),
    dashData: null,
  };

  // Replace this placeholder with your deployed Google Apps Script Web App URL.
  // The URL should end with /exec.
  const API_URL = 'https://script.google.com/macros/s/AKfycbwBWb5qUbo1i63GRtAiUX5hDeYNznFgE-5irgDr9RM1Pdh18AnFAJhFksY-4wTfOmuU/exec';

  function apiUrlEnabled(){
    return API_URL && !API_URL.includes('/.../exec');
  }

  async function apiCall(action, payload={}){
    if(!apiUrlEnabled()) return null;
    try{
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type':'text/plain;charset=utf-8'}, // CORS preflight-аас зайлсхийхийн тулд text/plain ашиглав
        body: JSON.stringify({action, ...payload}),
        mode: 'cors',
      });
      if(!response.ok) throw new Error('Network response was not ok: '+response.status);
      return await response.json();
    }catch(e){
      console.warn('API request failed:', action, e);
      return null;
    }
  }

  function currentMonthStr(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  }
  function monthNum(monthStr){ return Number(monthStr.split('-')[1]); }
  function escapeHtml(s){
    return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(iso){
    if(!iso) return '';
    const d = new Date(iso);
    return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  async function loadJSON(key, fallback){
    try{
      const r = await window.storage.get(key, true);
      return r ? JSON.parse(r.value) : fallback;
    }catch(e){ return fallback; }
  }
  async function saveJSON(key, value){
    try{
      const r = await window.storage.set(key, JSON.stringify(value), true);
      return !!r;
    }catch(e){ console.error('Storage error', e); return false; }
  }
  async function getMonthData(monthStr){
    if(apiUrlEnabled()){
      const remote = await apiCall('loadMonth', {month: monthStr});
      if(remote && remote.success){
        return {records: remote.records || {}};
      }
    }
    return await loadJSON('month:'+monthStr, {records:{}});
  }

  async function init(){
    STATE.employees = await loadJSON('employees', []);
    if(apiUrlEnabled()){
      const remote = await apiCall('loadEmployees');
      if(remote && remote.success && Array.isArray(remote.employees)){
        STATE.employees = remote.employees;
      }
    }
    render();
  }

  function render(){
    root.innerHTML = headerView() + '<div class="uts-body">' + tabsView() + tabBody() + '</div>' + footerNote();
  }

  function logoMark(){
    return '<div class="uts-mark"><div style="background:var(--safety)"></div><div style="background:var(--dusk)"></div><div style="background:var(--steel)"></div></div>';
  }
  function headerView(){
    return `<div class="uts-header">${logoMark()}<div class="uts-brand-text"><div class="t1">Уурхай · Цагийн тооцоо</div><div class="t2">HR удирдлага</div></div></div>`;
  }
  function footerNote(){
    return '<div class="uts-footer-note">Энэ файл нь HR-д зориулагдсан. Ажилтнууд "Ажилтны портал" файлаар өөрийн мэдээллээ хардаг бөгөөд хоёр файл нэг өгөгдлийн сан руу бичдэг.</div>';
  }

  function tabsView(){
    const tabs = [['employees','Ажилтнууд'],['entry','Сарын мэдээлэл'],['dashboard','Хяналтын самбар']];
    return '<div class="uts-tabs">' + tabs.map(([k,l])=>
      `<button class="uts-tab ${STATE.tab===k?'active':''}" onclick="UTS.setTab('${k}')">${l}</button>`
    ).join('') + '</div>';
  }
  function tabBody(){
    if(STATE.tab==='employees') return employeesView();
    if(STATE.tab==='entry') return entryView();
    if(STATE.tab==='dashboard') return dashboardView();
    return '';
  }

  function employeesView(){
    const editing = STATE.employees.find(e=>e.id===STATE.editingId);
    const rows = STATE.employees.map(e=>`
      <tr>
        <td class="uts-mono">${escapeHtml(e.id)}</td>
        <td>${escapeHtml(e.name)}</td>
        <td>${escapeHtml(e.position)}</td>
        <td>${escapeHtml(e.tenure)}</td>
        <td style="white-space:nowrap;">
          <button class="uts-btn ghost" onclick="UTS.editEmployee('${escapeHtml(e.id)}')">Засах</button>
          <button class="uts-btn ghost" onclick="UTS.removeEmployee('${escapeHtml(e.id)}')">Устгах</button>
        </td>
      </tr>`).join('');
    return `
    <div class="uts-card">
      <h3>${editing ? 'Ажилтны мэдээлэл засах' : 'Ажилтан нэмэх'}</h3>
      <div class="uts-row">
        <div class="uts-field"><label>Код</label><input id="emp-id" placeholder="EMP0001" value="${editing?escapeHtml(editing.id):''}" ${editing?'disabled':''}/></div>
        <div class="uts-field"><label>Нэр</label><input id="emp-name" placeholder="Ганхүү" value="${editing?escapeHtml(editing.name):''}"/></div>
        <div class="uts-field"><label>Албан тушаал</label><input id="emp-pos" placeholder="Дамп оператор" value="${editing?escapeHtml(editing.position):''}"/></div>
        <div class="uts-field"><label>Ажилласан хугацаа</label><input id="emp-tenure" placeholder="8 сар" value="${editing?escapeHtml(editing.tenure):''}"/></div>
        <button class="uts-btn" onclick="UTS.saveEmployee()">${editing?'Хадгалах':'Нэмэх'}</button>
        ${editing ? '<button class="uts-btn ghost" onclick="UTS.cancelEdit()">Цуцлах</button>' : '<button class="uts-btn secondary" onclick="UTS.seedDemo()">Жишээ ажилтан</button>'}
      </div>
    </div>
    <div class="uts-card">
      <h3>Ажилтны жагсаалт (${STATE.employees.length})</h3>
      ${STATE.employees.length===0 ? '<div class="uts-empty">Одоогоор ажилтан бүртгэгдээгүй байна.</div>' : `
      <div class="uts-table-wrap"><table class="uts-table">
        <thead><tr><th>Код</th><th>Нэр</th><th>Албан тушаал</th><th>Ажилласан хугацаа</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`}
    </div>`;
  }

  function entryView(){
    const empOptions = STATE.employees.map(e=>`<option value="${escapeHtml(e.id)}" ${STATE.entryEmpId===e.id?'selected':''}>${escapeHtml(e.id)} — ${escapeHtml(e.name)}</option>`).join('');
    let formHtml = '<div class="uts-empty">Ажилтан болон сараа сонгоно уу.</div>';
    if(STATE.entryEmpId){
      formHtml = `
      <div class="uts-row" style="margin-top:6px;">
        <div class="uts-field"><label>${monthNum(STATE.entryMonth)}-р сарын ажилласан хоног</label><input type="number" min="0" max="31" id="entry-workeddays"/></div>
        <div class="uts-field"><label>Ээлжийн амралт (хоног)</label><input type="number" min="0" max="31" id="entry-restdays"/></div>
        <button class="uts-btn" onclick="UTS.saveEntry()">Хадгалах</button>
      </div>
      <div class="uts-note" id="entry-status"></div>`;
    }
    return `
    <div class="uts-card">
      <h3>Сарын мэдээлэл оруулах</h3>
      <div class="uts-row">
        <div class="uts-field"><label>Ажилтан</label>
          <select id="entry-emp" onchange="UTS.pickEntryEmployee(this.value)">
            <option value="">— сонгох —</option>${empOptions}
          </select>
        </div>
        <div class="uts-field"><label>Сар</label>
          <input type="month" value="${STATE.entryMonth}" onchange="UTS.changeEntryMonth(this.value)"/>
        </div>
      </div>
      ${formHtml}
    </div>`;
  }

  function dashboardView(){
    const data = STATE.dashData;
    let body = '<div class="uts-empty">Уншиж байна...</div>';
    if(data){
      const recs = data.records || {};
      let confirmedCount = 0;
      const rows = STATE.employees.map(e=>{
        const r = recs[e.id];
        let status = '<span class="uts-badge empty">Орuулаагүй</span>';
        let wd='—', rd='—', when='';
        if(r){
          wd = r.workedDays; rd = r.restDays;
          if(r.confirmed){ confirmedCount++; status = '<span class="uts-badge ok">Баталгаажсан</span>'; when = fmtDate(r.confirmedAt); }
          else status = '<span class="uts-badge pending">Хүлээгдэж буй</span>';
        }
        return `<tr>
          <td class="uts-mono">${escapeHtml(e.id)}</td>
          <td>${escapeHtml(e.name)}</td>
          <td>${escapeHtml(e.position)}</td>
          <td class="uts-mono">${wd}</td>
          <td class="uts-mono">${rd}</td>
          <td>${status}</td>
          <td class="uts-mono" style="font-size:11px;color:var(--steel)">${when}</td>
        </tr>`;
      }).join('');
      body = `
      <div class="uts-summary-grid" style="grid-template-columns:repeat(3,1fr); max-width:420px;">
        <div class="uts-stat"><div class="v">${STATE.employees.length}</div><div class="l">Нийт ажилтан</div></div>
        <div class="uts-stat"><div class="v">${confirmedCount}</div><div class="l">Баталгаажсан</div></div>
        <div class="uts-stat"><div class="v">${STATE.employees.length-confirmedCount}</div><div class="l">Үлдсэн</div></div>
      </div>
      <div class="uts-table-wrap"><table class="uts-table">
        <thead><tr><th>Код</th><th>Нэр</th><th>Албан тушаал</th><th>Ажилласан хоног</th><th>Ээлжийн амралт</th><th>Төлөв</th><th>Огноо</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--steel)">Ажилтан байхгүй</td></tr>'}</tbody>
      </table></div>`;
    }
    return `
    <div class="uts-card">
      <h3>Хяналтын самбар</h3>
      <div class="uts-row">
        <div class="uts-field"><label>Сар</label><input type="month" value="${STATE.dashMonth}" onchange="UTS.changeDashMonth(this.value)"/></div>
      </div>
      ${body}
    </div>`;
  }

  window.UTS = {
    setTab(tab){ STATE.tab = tab; STATE.editingId = null; render(); if(tab==='dashboard') UTS.loadDashboard(); },

    async saveEmployee(){
      const idInput = document.getElementById('emp-id');
      const id = idInput.value.trim();
      const name = document.getElementById('emp-name').value.trim();
      const position = document.getElementById('emp-pos').value.trim();
      const tenure = document.getElementById('emp-tenure').value.trim();
      if(!id || !name){ alert('Код болон нэрийг бөглөнө үү.'); return; }
      const existingIdx = STATE.employees.findIndex(e=>e.id===id);
      if(STATE.editingId){
        STATE.employees[existingIdx] = {id, name, position, tenure};
      } else {
        if(existingIdx>=0){ alert('Энэ код өмнө нь бүртгэгдсэн байна.'); return; }
        STATE.employees.push({id, name, position, tenure});
      }
      await saveJSON('employees', STATE.employees);
      if(apiUrlEnabled()){
        const remote = await apiCall('saveEmployee', {id, name, position, tenure});
        if(remote && !remote.success){ console.warn('Remote saveEmployee failed'); }
      }
      STATE.editingId = null;
      render();
    },
    editEmployee(id){ STATE.editingId = id; render(); },
    cancelEdit(){ STATE.editingId = null; render(); },

    async removeEmployee(id){
      if(!confirm(id+' ажилтныг устгах уу?')) return;
      STATE.employees = STATE.employees.filter(e=>e.id!==id);
      await saveJSON('employees', STATE.employees);
      if(apiUrlEnabled()){
        const remote = await apiCall('deleteEmployee', {id});
        if(remote && !remote.success){ console.warn('Remote deleteEmployee failed'); }
      }
      render();
    },

    async seedDemo(){
      const demo = [
        {id:'EMP0001', name:'Ганхүү', position:'Дамп оператор', tenure:'8 сар'},
        {id:'EMP0002', name:'Болд', position:'Уурхайчин', tenure:'2 жил'},
      ];
      demo.forEach(d=>{ if(!STATE.employees.some(e=>e.id===d.id)) STATE.employees.push(d); });
      await saveJSON('employees', STATE.employees);
      if(apiUrlEnabled()){
        const remote = await apiCall('saveEmployees', {employees: STATE.employees});
        if(remote && !remote.success){ console.warn('Remote saveEmployees failed'); }
      }
      render();
    },

    async pickEntryEmployee(empId){
      STATE.entryEmpId = empId;
      render();
      if(!empId) return;
      const data = await getMonthData(STATE.entryMonth);
      const rec = data.records[empId];
      const wdInput = document.getElementById('entry-workeddays');
      const rdInput = document.getElementById('entry-restdays');
      if(rec && wdInput && rdInput){ wdInput.value = rec.workedDays; rdInput.value = rec.restDays; }
      const statusEl = document.getElementById('entry-status');
      if(statusEl) statusEl.textContent = rec && rec.confirmed ? 'Энэ ажилтан энэ сарын мэдээллээ аль хэдийн баталгаажуулсан. Дахин хадгалбал баталгаажуулалт цуцлагдана.' : '';
    },

    changeEntryMonth(month){ STATE.entryMonth = month; if(STATE.entryEmpId) UTS.pickEntryEmployee(STATE.entryEmpId); else render(); },

    async saveEntry(){
      const workedDays = Number(document.getElementById('entry-workeddays').value)||0;
      const restDays = Number(document.getElementById('entry-restdays').value)||0;
      const data = await getMonthData(STATE.entryMonth);
      const existing = data.records[STATE.entryEmpId];
      if(existing && existing.confirmed){
        if(!confirm('Энэ ажилтан энэ сарын мэдээллээ аль хэдийн баталгаажуулсан байна. Дахин хадгалбал баталгаажуулалт цуцлагдана. Үргэлжлүүлэх үү?')) return;
      }
      const entry = {workedDays, restDays, confirmed:false, confirmedAt:null, signature:null};
      let savedRemotely = false;
      if(apiUrlEnabled()){
        const remote = await apiCall('saveEntry', {month: STATE.entryMonth, id: STATE.entryEmpId, workedDays, restDays});
        savedRemotely = !!(remote && remote.success);
        if(!savedRemotely) console.warn('Remote saveEntry failed');
      }
      if(!savedRemotely){
        data.records[STATE.entryEmpId] = entry;
        await saveJSON('month:'+STATE.entryMonth, data);
      }
      alert('Хадгаллаа.');
      UTS.pickEntryEmployee(STATE.entryEmpId);
    },

    changeDashMonth(month){ STATE.dashMonth = month; UTS.loadDashboard(); },
    async loadDashboard(){
      STATE.dashData = null; render();
      STATE.dashData = await getMonthData(STATE.dashMonth);
      render();
    },
  };

  init();
})();
</script>
