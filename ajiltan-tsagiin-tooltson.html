<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap&subset=cyrillic');

  :root{
    --ink:#1E2421;
    --paper:#F7F3EA;
    --paper-dim:#ECE5D4;
    --steel:#41505B;
    --steel-dark:#2A343C;
    --ore:#C45A28;
    --dusk:#2B4257;
    --safety:#E2A93B;
    --line:rgba(30,36,33,0.14);
  }
  *{box-sizing:border-box;}
  .uts-app{font-family:'Inter','Noto Sans',sans-serif; color:var(--ink); background:var(--paper); min-height:100%; padding:0 0 40px; line-height:1.45;}
  .uts-app input, .uts-app button{font-family:inherit;}
  .uts-mono{font-family:'IBM Plex Mono',monospace;}

  .uts-header{background:var(--steel-dark); color:var(--paper); padding:18px 22px; display:flex; align-items:center; gap:12px;}
  .uts-mark{width:32px; height:32px; border-radius:4px; overflow:hidden; flex-shrink:0; border:1px solid rgba(247,243,234,.25);}
  .uts-mark div{height:33.3%;}
  .uts-brand-text .t1{font-family:'Oswald','Noto Sans',sans-serif; font-size:16px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;}
  .uts-brand-text .t2{font-size:11px; opacity:.65; font-family:'IBM Plex Mono',monospace;}

  .uts-body{max-width:520px; margin:0 auto; padding:28px 20px 0;}

  .uts-card{background:#fff; border:1px solid var(--line); border-radius:6px; padding:22px; margin-bottom:18px;}
  .uts-card h3{margin:0 0 14px; font-size:15px; font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.03em;}
  .uts-row{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;}
  .uts-field{display:flex; flex-direction:column; gap:5px; flex:1;}
  .uts-field label{font-size:11.5px; color:var(--steel); text-transform:uppercase; letter-spacing:.04em; font-weight:600;}
  .uts-field input{border:1px solid var(--line); border-radius:4px; padding:9px 10px; font-size:14px; background:var(--paper); width:100%;}
  .uts-btn{background:var(--ore); color:#fff; border:none; padding:10px 18px; border-radius:4px; cursor:pointer; font-weight:600; font-size:13.5px; font-family:'Oswald',sans-serif; letter-spacing:.03em; text-transform:uppercase;}
  .uts-btn:hover{opacity:.88;}
  .uts-btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
  .uts-btn:disabled{opacity:.4; cursor:not-allowed;}

  .uts-id-card-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px;}
  .uts-id-card-head .name{font-family:'Oswald',sans-serif; font-size:20px; font-weight:600;}
  .uts-id-card-head .pos{color:var(--steel); font-size:13.5px;}
  .uts-id-card-head .month-tag{font-family:'IBM Plex Mono',monospace; font-size:11px; background:var(--paper-dim); padding:4px 9px; border-radius:20px; color:var(--steel);}

  .uts-stat-list{margin-top:14px; border-top:1px solid var(--line);}
  .uts-stat-row{display:flex; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .uts-stat-row .l{color:var(--steel);}
  .uts-stat-row .v{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:15px;}

  .uts-empty{text-align:center; padding:30px 20px; color:var(--steel);}

  .uts-sigpad-wrap{border:1.5px dashed var(--line); border-radius:6px; padding:10px; background:var(--paper-dim);}
  canvas.uts-sigpad{background:#fff; border-radius:4px; touch-action:none; width:100%; height:150px; display:block;}
  .uts-sig-actions{display:flex; justify-content:space-between; margin-top:8px; align-items:center;}

  .uts-stamp-zone{display:flex; align-items:center; gap:20px; flex-wrap:wrap; padding:6px 4px;}
  .uts-stamp{width:108px; height:108px; border-radius:50%; border:3px double var(--ore); color:var(--ore); display:flex; align-items:center; justify-content:center; text-align:center; transform:rotate(-9deg); mix-blend-mode:multiply; opacity:.85; flex-shrink:0; animation:uts-stamp-in .42s cubic-bezier(.2,.9,.3,1.2);}
  .uts-stamp b{font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.05em; display:block;}
  @keyframes uts-stamp-in{0%{transform:rotate(-9deg) scale(1.5); opacity:0;} 100%{transform:rotate(-9deg) scale(1); opacity:.85;}}

  .uts-footer-note{max-width:520px; margin:26px auto 0; padding:0 20px; font-size:11.5px; color:var(--steel); text-align:center;}
</style>

<div class="uts-app" id="uts-root"></div>

<script>
(function(){
  const root = document.getElementById('uts-root');
  let sigCtx=null, sigDrawing=false, sigHas=false;

  let STATE = {
    id: '',
    month: currentMonthStr(),
    looked: false,
    employee: null,
    record: null,
    checked: false,
  };

  // Replace this placeholder with your deployed Google Apps Script Web App URL.
  // The URL should end with /exec.
  const API_URL = 'https://script.google.com/macros/s/AKfycbwBWb5qUbo1i63GRtAiUX5hDeYNznFgE-5irgDr9RM1Pdh18AnFAJhFksY-4wTfOmuU/exec';

  function apiUrlEnabled(){
    return API_URL && !API_URL.includes('/.../exec');
  }

  async function apiCall(action, payload={}){
    if(!apiUrlEnabled()) return null;
    try{
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type':'text/plain;charset=utf-8'}, // CORS preflight-аас зайлсхийхийн тулд text/plain ашиглав
        body: JSON.stringify({action, ...payload}),
        mode: 'cors',
      });
      if(!response.ok) throw new Error('Network response was not ok: '+response.status);
      return await response.json();
    }catch(e){
      console.warn('API request failed:', action, e);
      return null;
    }
  }

  function currentMonthStr(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  }
  function monthNum(monthStr){ return Number(monthStr.split('-')[1]); }
  function escapeHtml(s){
    return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(iso){
    if(!iso) return '';
    const d = new Date(iso);
    return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  async function loadJSON(key, fallback){
    try{
      const r = await window.storage.get(key, true);
      return r ? JSON.parse(r.value) : fallback;
    }catch(e){ return fallback; }
  }
  async function saveJSON(key, value){
    try{
      const r = await window.storage.set(key, JSON.stringify(value), true);
      return !!r;
    }catch(e){ console.error('Storage error', e); return false; }
  }

  async function getEmployeeInfo(id){
    const employees = await loadJSON('employees', []);
    let employee = employees.find(e => e.id === id) || null;
    if(apiUrlEnabled()){
      const remote = await apiCall('getEmployee', {id});
      if(remote && remote.success && remote.employee){
        employee = remote.employee;
      }
    }
    return employee;
  }

  async function getMonthData(monthStr){
    return await loadJSON('month:'+monthStr, {records:{}});
  }

  function logoMark(){
    return '<div class="uts-mark"><div style="background:var(--safety)"></div><div style="background:var(--dusk)"></div><div style="background:var(--steel)"></div></div>';
  }
  function headerView(){
    return `<div class="uts-header">${logoMark()}<div class="uts-brand-text"><div class="t1">Уурхай · Цагийн тооцоо</div><div class="t2">Ажилтны портал</div></div></div>`;
  }
  function footerNote(){
    return '<div class="uts-footer-note">Зөвхөн өөрийн кодоор орж, өөрийн мэдээллээ хардаг болно. Мэдээллийг HR оруулдаг.</div>';
  }

  function render(){
    root.innerHTML = headerView() + '<div class="uts-body">' + lookupCard() + resultCard() + '</div>' + footerNote();
    if(document.getElementById('sig-canvas')) wireSignaturePad();
  }

  function lookupCard(){
    return `
    <div class="uts-card">
      <h3>Өөрийн мэдээлэл харах</h3>
      <div class="uts-row">
        <div class="uts-field"><label>Ажилтны код</label><input id="portal-id" placeholder="EMP0001" value="${escapeHtml(STATE.id)}"/></div>
        <div class="uts-field"><label>Сар</label><input type="month" id="portal-month" value="${STATE.month}"/></div>
      </div>
      <button class="uts-btn" style="margin-top:14px;" onclick="UTS.lookup()">Харах</button>
    </div>`;
  }

  function resultCard(){
    if(!STATE.looked) return '';
    if(!STATE.record){
      return `<div class="uts-card"><div class="uts-empty">${escapeHtml(STATE.id)} кодтой ажилтны ${STATE.month} сарын мэдээлэл олдсонгүй. HR-тэй холбогдоно уу.</div></div>`;
    }
    const e = STATE.employee || {name:'', position:'', tenure:''};
    const r = STATE.record;
    let html = `
    <div class="uts-card">
      <div class="uts-id-card-head">
        <div>
          <div class="name">${escapeHtml(e.name)}</div>
          <div class="pos">${escapeHtml(e.position)}</div>
        </div>
        <div class="month-tag">${STATE.month}</div>
      </div>
      <div class="uts-stat-list">
        <div class="uts-stat-row"><span class="l">${monthNum(STATE.month)}-р сарын ажилласан хоног</span><span class="v">${r.workedDays}</span></div>
        <div class="uts-stat-row"><span class="l">Ээлжийн амралт</span><span class="v">${r.restDays}</span></div>
        <div class="uts-stat-row"><span class="l">Ажилласан хугацаа</span><span class="v">${escapeHtml(e.tenure)}</span></div>
      </div>
    </div>`;

    if(r.confirmed){
      html += `
      <div class="uts-card">
        <h3>Баталгаажуулалт</h3>
        <div class="uts-stamp-zone">
          <div class="uts-stamp"><div><b>БАТАЛГААЖСАН</b><div class="uts-mono" style="font-size:10px;">${fmtDate(r.confirmedAt)}</div></div></div>
          <div>
            ${r.signature ? `<img src="${r.signature}" style="max-width:200px; border:1px solid var(--line); border-radius:4px; background:#fff;"/>` : ''}
            <div style="font-size:12.5px; color:var(--steel); margin-top:6px;">Та дээрх мэдээлэлтэй танилцаж, баталгаажуулсан байна.</div>
          </div>
        </div>
      </div>`;
    } else {
      html += `
      <div class="uts-card">
        <label style="display:flex; gap:8px; align-items:flex-start; font-size:13.5px; margin-bottom:14px;">
          <input type="checkbox" id="ack-check" onchange="UTS.toggleAck(this.checked)" style="margin-top:3px;"/>
          <span>Дээрх мэдээлэлтэй танилцлаа.</span>
        </label>
        <div class="uts-field">
          <label>Гарын үсэг</label>
          <div class="uts-sigpad-wrap">
            <canvas id="sig-canvas" class="uts-sigpad"></canvas>
            <div class="uts-sig-actions">
              <button class="uts-btn ghost" onclick="UTS.clearSig()">Арилгах</button>
              <span class="uts-mono" style="font-size:11px;color:var(--steel);">Хулганаар/хуруугаараа зурна уу</span>
            </div>
          </div>
        </div>
        <button class="uts-btn" style="margin-top:14px;" id="confirm-btn" onclick="UTS.confirm()" disabled>Баталгаажуулах</button>
      </div>`;
    }
    return html;
  }

  function wireSignaturePad(){
    const canvas = document.getElementById('sig-canvas');
    if(!canvas) return;
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * ratio;
    canvas.height = 150 * ratio;
    sigCtx = canvas.getContext('2d');
    sigCtx.scale(ratio, ratio);
    sigCtx.lineWidth = 2.2;
    sigCtx.lineCap = 'round';
    sigCtx.strokeStyle = '#1E2421';
    sigHas = false;

    function pos(e){
      const r = canvas.getBoundingClientRect();
      const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return [cx, cy];
    }
    function start(e){ e.preventDefault(); sigDrawing=true; const [x,y]=pos(e); sigCtx.beginPath(); sigCtx.moveTo(x,y); }
    function move(e){ if(!sigDrawing) return; e.preventDefault(); const [x,y]=pos(e); sigCtx.lineTo(x,y); sigCtx.stroke(); sigHas=true; updateConfirmEnabled(); }
    function end(){ sigDrawing=false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', move, {passive:false});
    canvas.addEventListener('touchend', end);
  }
  function updateConfirmEnabled(){
    const btn = document.getElementById('confirm-btn');
    if(!btn) return;
    btn.disabled = !(STATE.checked && sigHas);
  }

  window.UTS = {
    async lookup(){
      const id = document.getElementById('portal-id').value.trim();
      const month = document.getElementById('portal-month').value || currentMonthStr();
      if(!id){ alert('Ажилтны кодоо оруулна уу.'); return; }
      STATE.id = id; STATE.month = month; STATE.checked = false;
      const employees = await loadJSON('employees', []);
      STATE.employee = employees.find(e=>e.id===id) || null;
      if(apiUrlEnabled()){
        const remote = await apiCall('lookup', {month, id});
        if(remote && remote.success){
          STATE.employee = remote.employee || STATE.employee;
          STATE.record = remote.record || null;
        }
      }
      if(!STATE.record){
        const data = await getMonthData(month);
        STATE.record = data.records[id] || null;
      }
      STATE.looked = true;
      render();
    },
    toggleAck(checked){ STATE.checked = checked; updateConfirmEnabled(); },
    clearSig(){
      if(!sigCtx) return;
      const canvas = document.getElementById('sig-canvas');
      sigCtx.clearRect(0,0,canvas.width,canvas.height);
      sigHas = false;
      updateConfirmEnabled();
    },
    async confirm(){
      const canvas = document.getElementById('sig-canvas');
      if(!STATE.checked || !sigHas || !canvas) return;
      const dataUrl = canvas.toDataURL('image/png');
      let rec = null;
      if(apiUrlEnabled()){
        const remote = await apiCall('confirm', {month: STATE.month, id: STATE.id, signature: dataUrl});
        if(remote && remote.success){
          rec = remote.record || {confirmed:true, confirmedAt: new Date().toISOString(), signature: dataUrl};
        }
      }
      if(!rec){
        const data = await getMonthData(STATE.month);
        const existing = data.records[STATE.id];
        if(!existing) return;
        existing.confirmed = true;
        existing.confirmedAt = new Date().toISOString();
        existing.signature = dataUrl;
        await saveJSON('month:'+STATE.month, data);
        rec = existing;
      }
      STATE.record = rec;
      render();
    },
  };

  render();
})();
</script>
